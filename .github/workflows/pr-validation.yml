name: PR validation

on:
  pull_request:

jobs:
  unit-tests:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - run: dotnet test tests/Sail.Tests/Sail.Tests.csproj --configuration Release

  # Every PR: amd64 build and smoke test for all four flavors.
  build-amd64:
    needs: unit-tests
    strategy:
      fail-fast: false
      matrix:
        flavor: [net10, net8, net9, all]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.flavor }} image (amd64)
        uses: docker/build-push-action@v6
        with:
          context: ./src/Sail
          target: ${{ matrix.flavor }}
          platforms: linux/amd64
          load: true
          tags: sail-pr:${{ matrix.flavor }}-amd64
          cache-from: type=gha,scope=pr-${{ matrix.flavor }}-amd64
          cache-to: type=gha,mode=max,scope=pr-${{ matrix.flavor }}-amd64

      - name: Smoke test ${{ matrix.flavor }} image (amd64)
        run: bash ./tests/smoke/run-smoke-tests.sh sail-pr:${{ matrix.flavor }}-amd64 ${{ matrix.flavor }}

  # Every PR: arm64 build and smoke test for net10 only.
  build-arm64-net10:
    needs: unit-tests
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build net10 image (arm64)
        uses: docker/build-push-action@v6
        with:
          context: ./src/Sail
          target: net10
          platforms: linux/arm64
          load: true
          tags: sail-pr:net10-arm64
          cache-from: type=gha,scope=pr-net10-arm64
          cache-to: type=gha,mode=max,scope=pr-net10-arm64

      - name: Smoke test net10 image (arm64)
        run: bash ./tests/smoke/run-smoke-tests.sh sail-pr:net10-arm64 net10
